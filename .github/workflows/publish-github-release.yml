name: Publish GitHub Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing vX.Y.Z tag to create or update a GitHub Release for"
        required: true
        type: string

permissions:
  contents: write

jobs:
  publish_release:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
      EVENT_NAME: ${{ github.event_name }}
      INPUT_TAG: ${{ github.event.inputs.tag || '' }}
      PUSH_TAG: ${{ github.ref_name }}
      REPOSITORY: ${{ github.repository }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Resolve release tag
        id: release_tag
        shell: bash
        run: |
          set -euo pipefail

          if [[ "$EVENT_NAME" == "workflow_dispatch" ]]; then
            TAG="$INPUT_TAG"
          else
            TAG="$PUSH_TAG"
          fi

          if [[ -z "$TAG" ]]; then
            echo "Tag is required." >&2
            exit 1
          fi

          if [[ "$TAG" != v* ]]; then
            echo "Tag must start with v (got: $TAG)" >&2
            exit 1
          fi

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Fetch release tag
        shell: bash
        run: |
          set -euo pipefail
          git fetch --force origin "refs/tags/${{ steps.release_tag.outputs.tag }}:refs/tags/${{ steps.release_tag.outputs.tag }}"

      - name: Create or update GitHub Release
        shell: bash
        env:
          RELEASE_TAG: ${{ steps.release_tag.outputs.tag }}
          VERSION: ${{ steps.release_tag.outputs.version }}
        run: |
          set -euo pipefail

          NOTES=$(mktemp)
          python3 scripts/render_release_notes.py \
            --tag "$RELEASE_TAG" \
            --version "$VERSION" \
            --repo "$REPOSITORY" \
            --reason "tag-triggered release publication" \
            --out "$NOTES"

          if gh release view "$RELEASE_TAG" --repo "$REPOSITORY" >/dev/null 2>&1; then
            gh release edit "$RELEASE_TAG" \
              --repo "$REPOSITORY" \
              --title "$RELEASE_TAG" \
              --notes-file "$NOTES"
            echo "Updated existing GitHub Release ${RELEASE_TAG}."
            exit 0
          fi

          gh release create "$RELEASE_TAG" \
            --repo "$REPOSITORY" \
            --verify-tag \
            --title "$RELEASE_TAG" \
            --notes-file "$NOTES"

          echo "Created GitHub Release ${RELEASE_TAG}."