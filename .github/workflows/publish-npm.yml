name: Publish npm + PyPI

on:
  push:
    branches:
      - main
    paths:
      - 'hermit-ui/**'
      - 'hermit_agent/**'
      - 'pyproject.toml'
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install package + test dependencies
        run: pip install -e ".[test]"
      - name: Run pytest suite
        run: pytest tests/ -q

  publish:
    needs: test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        working-directory: hermit-ui
        run: npm ci

      - name: Build
        working-directory: hermit-ui
        run: npm run build

      - name: Bump to next patch version from registry
        run: |
          PUBLISHED=$(npm view @cafitac/hermit-agent version 2>/dev/null || echo "0.0.0")
          LOCAL=$(node -p "require('./hermit-ui/package.json').version")
          # Use whichever is higher as the base so pre-bumped local versions don't conflict
          BASE=$(printf '%s\n%s\n' "$PUBLISHED" "$LOCAL" | sort -V | tail -1)
          IFS='.' read -r MAJOR MINOR PATCH <<< "$BASE"
          NEXT="${MAJOR}.${MINOR}.$((PATCH + 1))"
          echo "Publishing version $NEXT (registry: $PUBLISHED, local: $LOCAL)"
          echo "NEXT=$NEXT" >> "$GITHUB_ENV"
          # Bump npm package.json (hermit-ui)
          npm version "$NEXT" --no-git-tag-version --prefix hermit-ui
          # Sync pyproject.toml
          sed -i "s/^version = \".*\"/version = \"$NEXT\"/" pyproject.toml

      - name: Verify npm package shape
        working-directory: hermit-ui
        run: npm_config_cache="$(mktemp -d)" npm pack --dry-run

      - name: Publish npm package
        working-directory: hermit-ui
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public --provenance

      - name: Build Python distributions
        run: |
          pip install --upgrade pip build
          python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          user: __token__
          password: ${{ secrets.PYPI_API_TOKEN }}
          skip-existing: true

      - name: Write back version and tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pyproject.toml hermit-ui/package.json
          git diff --staged --quiet || git commit -m "chore: release v${NEXT} [skip ci]"
          git tag "v${NEXT}" || echo "Tag v${NEXT} already exists, skipping"
          git push origin HEAD:main --tags
