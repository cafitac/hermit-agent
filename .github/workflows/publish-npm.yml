name: Publish npm

on:
  push:
    branches:
      - main
    paths:
      - 'hermit-ui/**'
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install package + test dependencies
        run: pip install -e ".[test]"
      - name: Run pytest suite
        run: pytest tests/ -q

  publish:
    needs: test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        working-directory: hermit-ui
        run: npm ci

      - name: Build
        working-directory: hermit-ui
        run: npm run build

      - name: Bump to next patch version from registry
        working-directory: hermit-ui
        run: |
          PUBLISHED=$(npm view @cafitac/hermit-agent version 2>/dev/null || echo "0.0.0")
          IFS='.' read -r MAJOR MINOR PATCH <<< "$PUBLISHED"
          NEXT="${MAJOR}.${MINOR}.$((PATCH + 1))"
          npm version "$NEXT" --no-git-tag-version
          echo "Publishing version $NEXT (previous: $PUBLISHED)"

      - name: Verify npm package shape
        working-directory: hermit-ui
        run: npm_config_cache="$(mktemp -d)" npm pack --dry-run

      - name: Publish npm package
        working-directory: hermit-ui
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public --provenance
